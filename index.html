// ===== TIERING =====
prompts.forEach(p => { p.free = (p.diff === 'easy'); });
const unlocked = new Set(JSON.parse(localStorage.getItem('ph_unlocked')||'[]'));

// ===== STATE =====
let activeCat='all', activeDiff='all';

function filterPrompts(){
  let list=[...prompts];
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  if(activeCat!=='all') list=list.filter(p=>p.cat===activeCat);
  if(activeDiff!=='all') list=list.filter(p=>p.diff===activeDiff);
  if(q) list=list.filter(p=>p.title.toLowerCase().includes(q)||p.catName.includes(q)||p.desc.includes(q));
  return list;
}
function setCat(c){activeCat=c;renderCatGrid();renderAll();}
function setFilter(d,b){activeDiff=d;document.querySelectorAll('.fl-btn').forEach(x=>x.classList.remove('active'));if(b)b.classList.add('active');renderAll();}
function doSearch(){renderAll();}

// ===== RENDER =====
function renderCatGrid(){
  document.getElementById('catGrid').innerHTML=['writing','coding','art','office','marketing','edu','life'].map(c=>{
    const co=CAT_COLOR[c];const ct=prompts.filter(p=>p.cat===c).length;
    return '<div class="cat-card" onclick="setCat(\''+c+'\')" style="'+(activeCat===c?'border-color:var(--purple);background:var(--purple-light)':'')+'"><div class="icon" style="background:'+co.bg+'">'+co.icon+'</div><div class="name">'+CAT_NAMES[c]+'</div><div class="count">'+ct+' 条</div></div>';
  }).join('');
}
function renderFeatured(){
  document.getElementById('featuredGrid').innerHTML=prompts.filter(p=>p.feat).slice(0,4).map(p=>
    '<div class="feat-card" onclick="openModal(\''+esc(p.title)+'\')"><div class="fc-header"><div class="fc-title">'+CAT_COLOR[p.cat].icon+' '+p.title+'</div><div class="fc-badges"><span class="badge '+DIFF_CLASS[p.diff]+'">'+DIFF_MAP[p.diff]+'</span><span class="badge badge-model">'+p.model.split('·')[0].trim()+'</span></div></div><div class="fc-desc">'+p.desc+'</div><div class="fc-preview">'+esc(p.prompt.substring(0,150))+'...</div><div class="fc-footer"><span>'+p.catName+' · '+p.model+'</span><span style="color:var(--purple)">查看详情 →</span></div></div>'
  ).join('');
}
function renderAll(){
  var list=filterPrompts();
  document.getElementById('resultCount').textContent='共 '+list.length+' 条';
  document.getElementById('empty').style.display=list.length?'none':'block';
  document.getElementById('promptGrid').innerHTML=list.map(p=>{
    var isFree=p.free||unlocked.has(p.title);
    return '<div class="p-card'+(isFree?'':' paid')+'">'+
    '<div class="pc-top"><div class="pc-title">'+CAT_COLOR[p.cat].icon+' '+p.title+'</div>'+
    '<div class="fc-badges"><span class="badge '+DIFF_CLASS[p.diff]+'">'+DIFF_MAP[p.diff]+'</span>'+
    '<span class="badge '+(isFree?'badge-free':'badge-paid')+'">'+(isFree?'免费':'付费')+'</span></div></div>'+
    '<div class="pc-desc">'+p.desc+'</div>'+
    '<div class="pc-preview"><div class="pc-preview-inner">'+esc(p.prompt.substring(0,120))+'...</div>'+
    (isFree?'':'<div class="pc-lock" onclick="event.stopPropagation();openPayModal()">🔒</div>')+'</div>'+
    '<div class="pc-bottom"><span class="pc-model">'+p.model+'</span><div class="pc-actions">'+
    (isFree
      ?'<button class="btn-sm btn-detail" onclick="openModal(\''+esc(p.title)+'\')">详情</button><button class="btn-sm btn-copy" onclick="copyPrompt(\''+esc(p.title)+'\',this)">复制</button>'
      :'<button class="btn-sm btn-unlock" onclick="event.stopPropagation();openPayModal()">🔓 解锁 ¥9.9</button>'
    )+'</div></div></div>';
  }).join('');
}

// ===== PAYMENT =====
function openPayModal(){document.getElementById('payModal').classList.add('show');}
function closePayModal(){document.getElementById('payModal').classList.remove('show');}
function confirmPay(){
  prompts.filter(p=>!p.free).forEach(p=>unlocked.add(p.title));
  localStorage.setItem('ph_unlocked',JSON.stringify([...unlocked]));
  var b=document.getElementById('payConfirmBtn');
  b.textContent='✅ 解锁成功！';b.style.background='var(--green)';
  setTimeout(function(){closePayModal();renderAll();},1000);
}

// ===== DETAIL MODAL =====
var curModal=null;
function openModal(title){
  curModal=prompts.find(p=>p.title===title);if(!curModal)return;
  document.getElementById('mTitle').textContent=curModal.title;
  document.getElementById('mMeta').innerHTML=CAT_COLOR[curModal.cat].icon+' '+curModal.catName+' · '+DIFF_MAP[curModal.diff]+' · '+curModal.model;
  document.getElementById('mPrompt').textContent=curModal.prompt;
  document.getElementById('mTips').innerHTML='<strong>💡 使用技巧</strong><br>'+curModal.tips;
  document.getElementById('modal').classList.add('show');
}
function modalCopy(){
  if(!curModal)return;
  navigator.clipboard.writeText(curModal.prompt).then(function(){
    document.getElementById('mCopyBtn').textContent='✅ 已复制！';
    setTimeout(function(){document.getElementById('mCopyBtn').textContent='📋 复制到剪贴板';},2000);
  });
}
function copyPrompt(title,btn){
  var p=prompts.find(p=>p.title===title);if(!p)return;
  navigator.clipboard.writeText(p.prompt).then(function(){btn.textContent='✅';setTimeout(function(){btn.textContent='复制';},1500)});
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function randomPrompt(){var p=prompts[Math.floor(Math.random()*prompts.length)];openModal(p.title);}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closePayModal();}});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'\\\'').replace(/"/g,'&quot;');}

renderCatGrid();renderFeatured();renderAll();
</script>
