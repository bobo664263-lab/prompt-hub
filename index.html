  {id:1,title:"专业文章撰写",cat:"writing",tag:"写作",hot:true,prompt:"你是一位资深专栏作家。请以[主题]为核心，写一篇1500字左右的深度文章。要求：\n1. 开头用引人入胜的故事或数据切入\n2. 分3-4个论点展开，每个论点配案例\n3. 语言生动有力，避免说教\n4. 结尾给出可操作的行动建议",model:"通用"},
  {id:2,title:"小红书爆款文案",cat:"writing",tag:"写作",hot:true,prompt:"你是一位小红书资深博主。请为[产品/话题]创作一篇小红书种草笔记。要求：\n1. 标题用emoji+数字+痛点，20字以内\n2. 正文用口语化表达，像朋友聊天\n3. 每段不超过3行，多用emoji分段\n4. 加入真实使用感受和效果对比\n5. 文末引导互动（提问/求点赞）\n6. 带上5-8个相关话题标签",model:"通用"},
  {id:3,title:"公众号深度长文",cat:"writing",tag:"写作",prompt:"你是一位资深新媒体主编。请围绕[主题]撰写一篇公众号深度文章，字数2000-2500。要求：\n1. 标题要有悬念感或冲突感\n2. 用故事+数据+观点的三段式结构\n3. 加入至少3个真实案例\n4. 行文风格参考「人物」杂志调性\n5. 结尾要有金句收尾",model:"通用"},
  {id:4,title:"短视频口播脚本",cat:"writing",tag:"写作",hot:true,prompt:"你是一位短视频编导。请为[话题]创作一条60秒的口播脚本。要求：\n1. 前3秒用反常识/提问/冲突抓住注意力\n2. 语言口语化，像对着朋友说话\n3. 节奏紧凑，每15秒一个信息点\n4. 结尾有力，引导点赞评论\n5. 标注语气和节奏（快/慢/停顿）",model:"通用"},
  {id:5,title:"商业计划书大纲",cat:"writing",tag:"写作",prompt:"请帮我生成一份[项目名称]的商业计划书大纲。包含：\n1. 项目概述（一句话说清做什么）\n2. 市场分析（目标用户、市场规模、竞争格局）\n3. 产品/服务（核心功能、差异化优势）\n4. 商业模式（收入来源、定价策略）\n5. 运营计划（团队、里程碑、关键指标）\n6. 财务预测（12个月收入成本预估）\n7. 融资需求（金额、用途、退出方案）",model:"通用"},
  {id:6,title:"SEO优化文章",cat:"writing",tag:"写作",prompt:"你是一位SEO内容专家。请围绕关键词[关键词]写一篇SEO优化的文章。要求：\n1. 标题包含核心关键词，长度15-25字\n2. 正文1500字以上，关键词密度2-3%\n3. 使用H2/H3结构组织内容\n4. 自然融入3-5个长尾关键词\n5. 添加内链和外链的建议位置\n6. 文末添加FAQ板块覆盖更多关键词",model:"通用"},
  {id:7,title:"知乎高赞回答",cat:"writing",tag:"写作",prompt:"你是一位知乎万粉答主。请为问题「[问题]」撰写一篇高赞回答。要求：\n1. 开头一针见血，直接回应问题\n2. 用「先说结论→分析原因→给出方案」结构\n3. 穿插3-5个真实经历或个人观点\n4. 适当使用加粗、引用增强可读性\n5. 结尾抛出一个延伸思考引发讨论",model:"通用"},
  {id:8,title:"英文邮件润色",cat:"writing",tag:"写作",prompt:"Please polish the following email to make it more professional and native-sounding. Keep the original meaning but improve:\n1. Grammar and sentence structure\n2. Tone (make it [formal/casual/friendly])\n3. Flow and readability\n\nOriginal email:\n[原文]",model:"通用"},
  {id:9,title:"小说情节构思",cat:"writing",tag:"写作",prompt:"你是一位畅销小说家。请帮我构思一个[类型]小说的情节框架。要求：\n1. 一句话故事梗概（Logline）\n2. 主要人物设定（主角、反派、配角各100字）\n3. 三幕剧结构：开端-冲突-结局\n4. 3个关键转折点\n5. 2-3个让人意想不到的情节反转\n6. 主题和情感主线",model:"通用"},
  {id:10,title:"产品文案优化",cat:"writing",tag:"写作",prompt:"你是一位资深文案策划。请帮我优化以下产品文案，提升转化率。\n\n当前文案：[文案内容]\n目标人群：[人群描述]\n\n优化方向：\n1. 突出用户痛点而非产品功能\n2. 用AIDA模型（注意-兴趣-欲望-行动）重构\n3. 加入社交证明元素\n4. 降低用户的决策焦虑\n5. 给出3个不同风格的版本",model:"通用"},
  {id:11,title:"周报/日报生成",cat:"writing",tag:"写作",hot:true,prompt:"请根据以下工作内容，帮我生成一份结构清晰的周报：\n\n本周完成：\n[工作内容]\n\n要求：\n1. 格式：完成事项 | 进展说明 | 下周计划\n2. 用数据和成果说话\n3. 突出亮点和遇到的挑战\n4. 语言简洁专业\n5. 控制在500字以内",model:"通用"},
  {id:12,title:"论文摘要生成",cat:"writing",tag:"写作",prompt:"请根据以下论文内容，帮我撰写一份学术论文摘要。\n\n论文主题：[主题]\n主要内容：[内容要点]\n\n要求：\n1. 200-300字\n2. 包含研究背景、方法、结果、结论四要素\n3. 语言学术规范\n4. 包含3-5个关键词\n5. 中英文对照",model:"通用"},

  {id:20,title:"代码Bug修复",cat:"coding",tag:"编程",hot:true,prompt:"你是一位资深软件工程师。请帮我分析和修复以下代码中的Bug：\n\n语言：[语言]\n代码：\n```\n[代码]\n```\n错误信息：[错误信息]\n\n请：\n1. 分析Bug根因\n2. 给出修复方案\n3. 解释为什么会出现这个Bug\n4. 提供修复后的完整代码\n5. 建议如何避免类似问题",model:"通用"},
  {id:21,title:"功能需求转代码",cat:"coding",tag:"编程",hot:true,prompt:"你是一位全栈工程师。请根据以下需求生成代码：\n\n功能描述：[描述]\n技术栈：[技术栈]\n\n要求：\n1. 先设计数据结构和API接口\n2. 写出核心逻辑代码\n3. 添加关键注释\n4. 考虑边界情况和错误处理\n5. 给出测试用例建议",model:"通用"},
  {id:22,title:"代码审查/优化",cat:"coding",tag:"编程",prompt:"你是一位代码审查专家。请审查以下代码并给出优化建议：\n\n语言：[语言]\n代码：\n```\n[代码]\n```\n\n审查维度：\n1. 代码结构和可读性\n2. 性能优化点\n3. 安全漏洞\n4. 最佳实践对齐\n5. 可维护性建议",model:"通用"},
  {id:23,title:"SQL查询优化",cat:"coding",tag:"编程",prompt:"你是一位数据库优化专家。请帮我优化以下SQL查询：\n\n```sql\n[SQL语句]\n```\n数据库：[MySQL/PostgreSQL]\n表结构：[表结构]\n\n要求：\n1. 分析当前查询的性能瓶颈\n2. 给出优化方案（索引、改写等）\n3. 提供优化后的SQL\n4. 解释优化原理",model:"通用"},
  {id:24,title:"正则表达式生成",cat:"coding",tag:"编程",prompt:"请帮我生成一个正则表达式，用于匹配[需求描述]。\n\n示例输入和目标：\n输入：[例子]\n期望匹配：[期望]\n\n要求：\n1. 给出正则表达式\n2. 逐段解释含义\n3. 提供至少3个测试用例\n4. 说明可能出现的边界问题",model:"通用"},
  {id:25,title:"API接口文档生成",cat:"coding",tag:"编程",prompt:"请根据以下代码，生成一份标准的API接口文档：\n\n```\n[代码]\n```\n\n文档需包含：\n1. 接口URL和方法\n2. 请求参数（名称、类型、必填、说明）\n3. 响应格式（成功和失败示例）\n4. 错误码说明\n5. 调用示例（curl/Python）\n6. 注意事项",model:"通用"},
  {id:26,title:"算法题讲解",cat:"coding",tag:"编程",prompt:"请讲解以下算法题的思路和实现：\n\n题目：[题目描述]\n\n要求：\n1. 先分析题意和约束条件\n2. 给出暴力解法的思路和复杂度\n3. 逐步优化到最优解\n4. 分析时空复杂度\n5. 提供完整可运行的代码\n6. 用简单比喻帮助理解",model:"通用"},
  {id:27,title:"Docker部署配置",cat:"coding",tag:"编程",prompt:"请帮我为一个[技术栈]项目编写Docker配置。\n\n项目说明：[说明]\n\n要求：\n1. Dockerfile（多阶段构建）\n2. docker-compose.yml（含数据库等依赖）\n3. .dockerignore\n4. 环境变量管理建议\n5. 启动和调试命令",model:"通用"},
  {id:28,title:"Git提交信息生成",cat:"coding",tag:"编程",prompt:"请根据以下代码改动，生成一条规范的Git commit message。\n\n改动内容：\n[改动描述]\n\n要求：\n1. 遵循 Conventional Commits 规范\n2. 标题≤50字符\n3. 正文解释What/Why/How\n4. 英文和中文各一个版本",model:"通用"},
  {id:29,title:"前端组件开发",cat:"coding",tag:"编程",prompt:"你是一位前端专家。请帮我开发一个[组件功能]的React/Vue组件。\n\n需求：[需求描述]\n设计要求：[设计要点]\n\n要求：\n1. 包含Props/Events/Slots定义\n2. 响应式设计和无障碍支持\n3. 完整的TypeScript类型定义\n4. 使用示例\n5. 单元测试建议",model:"通用"},
  {id:30,title:"Python数据分析脚本",cat:"coding",tag:"编程",prompt:"请帮我写一个Python数据分析脚本，用于[分析目标]。\n\n数据源：[数据描述/CSV路径]\n\n要求：\n1. 使用pandas进行数据清洗\n2. 关键指标计算\n3. 使用matplotlib/seaborn生成可视化图表\n4. 输出分析结论和建议\n5. 代码注释清晰",model:"通用"},

  // === AI绘画 ===
  {id:40,title:"写实人像摄影",cat:"art",tag:"绘画",hot:true,prompt:"Realistic portrait photography, [人物描述如：young Asian woman with long black hair], [场景如：sitting in a coffee shop by the window], [光线如：soft natural window lighting, golden hour], shot on [相机如：Canon EOS R5, 85mm f/1.2 lens], shallow depth of field, bokeh background, hyper-realistic, 8K, professional color grading --ar 3:4 --v 6.0",model:"Midjourney"},
  {id:41,title:"产品/电商白底图",cat:"art",tag:"绘画",hot:true,prompt:"Professional product photography, [产品描述], white background, studio lighting, commercial photography, high-end retouching, sharp focus, 8K detail, product shot from [角度], minimal shadow, clean composition, suitable for e-commerce --ar 1:1 --v 6.0",model:"Midjourney"},
  {id:42,title:"二次元动漫角色",cat:"art",tag:"绘画",prompt:"anime style illustration, [角色描述], [表情和姿势], [服装], [背景], Japanese anime art style, Studio Ghibli inspired, vibrant colors, clean lineart, cel shading, masterpiece, 4K --ar 2:3 --niji 6",model:"Midjourney"},
  {id:43,title:"赛博朋克场景",cat:"art",tag:"绘画",hot:true,prompt:"Cyberpunk cityscape at night, [场景细节如：neon-lit street in futuristic Tokyo], flying cars, holographic billboards, rain-slicked streets reflecting neon lights, Blade Runner aesthetic, cinematic lighting, volumetric fog, ray tracing, ultra-detailed, 8K, Unreal Engine 5 render --ar 16:9 --v 6.0",model:"Midjourney"},
  {id:44,title:"极简Logo设计",cat:"art",tag:"绘画",prompt:"Minimalist logo design for [品牌/产品], [行业], [风格如：几何/线性/渐变], [颜色], clean and modern, flat vector style, white background, graphic design, recognizable silhouette, no text --ar 1:1 --v 6.0",model:"Midjourney"},
  {id:45,title:"国风水墨画",cat:"art",tag:"绘画",prompt:"Traditional Chinese ink wash painting style (水墨画), [主题如：竹林山水], misty mountains, flowing water, elegant brush strokes, ink splatter effect, negative space composition, Chinese artistic aesthetic, silk scroll texture, masterpiece, delicate details, zen atmosphere --ar 3:4 --v 6.0",model:"Midjourney"},
  {id:46,title:"3D卡通IP形象",cat:"art",tag:"绘画",prompt:"Cute 3D character design, [角色描述], chibi style, soft pastel colors, Pixar/Disney inspired, smooth textures, ambient occlusion, soft studio lighting, 3D render, C4D style, isometric view, white background, toy-like material --ar 1:1 --v 6.0",model:"Midjourney"},
  {id:47,title:"食物摄影",cat:"art",tag:"绘画",prompt:"Gourmet food photography, [食物名称], [摆盘描述], overhead/flat lay shot, natural light, steam rising, mouth-watering, shallow depth of field, wooden table surface, fresh ingredients visible, restaurant menu quality, 8K detail --ar 4:5 --v 6.0",model:"Midjourney"},
  {id:48,title:"室内设计效果图",cat:"art",tag:"绘画",prompt:"Interior design render, [风格如：modern minimalist living room], [色彩搭配], [家具风格], floor-to-ceiling windows with natural light, high-end furniture, architectural visualization, photorealistic, 8K, wide angle lens, magazine quality, cozy atmosphere --ar 16:9 --v 6.0",model:"Midjourney"},
  {id:49,title:"DeepSeek文生图通用",cat:"art",tag:"绘画",prompt:"请生成一张图片：[主题描述]。风格：[风格]，色调：[色调]，构图：[构图方式]，画质：高清，比例：[比例]",model:"DeepSeek"},
  {id:50,title:"可灵AI视频分镜",cat:"art",tag:"绘画",prompt:"视频主题：[主题]\n时长：5秒\n画面描述：[详细的场景、人物、动作描述]\n运镜：[推/拉/摇/移]\n色调：[暖/冷/复古/赛博]\n风格：[写实/动画/电影感]\n特殊效果：[如：粒子消散、水墨晕染]",model:"可灵AI"},

  // === 办公效率 ===
  {id:60,title:"会议纪要生成",cat:"office",tag:"办公",hot:true,prompt:"请根据以下会议记录，生成一份结构清晰的会议纪要：\n\n会议记录：\n[内容]\n\n要求：\n1. 会议时间、参会人员、主题\n2. 讨论要点（按议题分类）\n3. 达成的决议和共识\n4. 待办事项（责任人+截止日期）\n5. 下次会议安排\n6. 格式简洁专业",model:"通用"},
  {id:61,title:"Excel公式生成",cat:"office",tag:"办公",hot:true,prompt:"请帮我写一个Excel公式，实现以下功能：\n\n需求：[需求描述]\n数据范围：[如：A1:A100]\n条件：[条件描述]\n\n要求：\n1. 给出公式\n2. 解释每个部分的作用\n3. 提供一个简化版和一个增强版\n4. 如果涉及数组公式，标注版本要求",model:"通用"},
  {id:62,title:"PPT大纲生成",cat:"office",tag:"办公",prompt:"请帮我为「[主题]」制作一份PPT大纲。\n\n受众：[受众描述]\n时长：[分钟]\n页数：[页数]\n\n要求：\n1. 每页标题+核心要点（3-5条）\n2. 标注重点页和建议配图\n3. 开场要有吸引力，结尾要有行动号召\n4. 数据页标注数据来源\n5. 给出演讲备注建议",model:"通用"},
  {id:63,title:"数据分析报告",cat:"office",tag:"办公",prompt:"请根据以下数据，生成一份数据分析报告：\n\n数据：[数据描述]\n分析目标：[目标]\n\n要求：\n1. 数据概览（关键指标汇总）\n2. 趋势分析（同比/环比）\n3. 异常值检测和解释\n4. 3-5个可落地的优化建议\n5. 附可视化图表建议（用什么图展示什么数据）",model:"通用"},
  {id:64,title:"简历优化",cat:"office",tag:"办公",hot:true,prompt:"你是一位资深HR。请帮我优化以下简历，提升面试机会：\n\n原始简历：\n[简历内容]\n目标职位：[职位]\n\n优化方向：\n1. 用STAR法则改写经历\n2. 量化成果（用数字说话）\n3. 匹配目标职位的JD关键词\n4. 突出差异化优势\n5. 控制在1-2页\n6. 给3个不同风格的推荐模板",model:"通用"},
  {id:65,title:"邮件自动回复",cat:"office",tag:"办公",prompt:"请根据以下场景，帮我撰写一封专业的邮件回复：\n\n场景：[场景描述]\n收件人：[收件人描述]\n语气：[正式/友好/商务]\n\n要求：\n1. 主题行简洁明确\n2. 开头得体问候\n3. 正文直接回应核心问题\n4. 结尾加下一步行动\n5. 签名档格式统一",model:"通用"},
  {id:66,title:"项目排期表",cat:"office",tag:"办公",prompt:"请帮我为一个[项目类型]项目制定详细的排期计划。\n\n项目信息：\n- 目标：[目标]\n- 团队：[人数/角色]\n- 周期：[周数]\n\n要求：\n1. 按周分解里程碑\n2. 标注关键依赖和风险点\n3. 每个任务标注负责人和产出\n4. 预留20%缓冲时间\n5. 给出甘特图数据（可直接导入Excel）",model:"通用"},
  {id:67,title:"竞品分析框架",cat:"office",tag:"办公",prompt:"请帮我为[产品/公司]做一份竞品分析。\n\n竞争对手：[竞品列表]\n\n分析维度：\n1. 基本信息（成立时间、融资、团队规模）\n2. 产品功能对比矩阵\n3. 定价策略对比\n4. 用户口碑（评分、评论关键词）\n5. SWOT分析\n6. 差异化机会和建议",model:"通用"},
  {id:68,title:"OKR制定",cat:"office",tag:"办公",prompt:"请帮我和团队制定下一季度的OKR。\n\n团队：[团队说明]\n上一季度回顾：[回顾]\n公司目标：[公司目标]\n\n要求：\n1. 3-5个Objective\n2. 每个O配2-3个可量化的Key Result\n3. KR要符合SMART原则\n4. 与公司目标对齐\n5. 给出去年同期的参考数据",model:"通用"},

  // === 营销运营 ===
  {id:80,title:"朋友圈营销文案",cat:"marketing",tag:"营销",hot:true,prompt:"你是一位朋友圈营销专家。请为[产品/服务]创作3条朋友圈文案。\n\n产品卖点：[卖点]\n目标人群：[人群]\n\n要求：\n1. 第1条：痛点切入型（先讲故事再引出产品）\n2. 第2条：客户见证型（用真实效果说话）\n3. 第3条：限时活动型（制造紧迫感）\n4. 每条配2-3个emoji\n5. 每条附带配图建议",model:"通用"},
  {id:81,title:"小红书笔记系列",cat:"marketing",tag:"营销",hot:true,prompt:"请为[产品/品牌]策划一个小红书内容矩阵，共5篇笔记。\n\n产品：[产品]\n目标：[目标]\n\n要求：\n1. 5篇内容覆盖：开箱测评、对比评测、使用教程、场景种草、合集推荐\n2. 每篇给出标题、正文、话题标签\n3. 突出3个核心卖点在不同笔记中反复出现\n4. 每篇配不同的封面图方案\n5. 发布节奏建议（周几发、几点发）",model:"通用"},
  {id:82,title:"广告投放文案AB测试",cat:"marketing",tag:"营销",prompt:"请为[产品]的[平台]广告创作5组AB测试文案。\n\n产品：[产品]\n平台：[抖音/朋友圈/百度]\n预算：[预算]\n\n要求：\n1. 每组2个版本（A/B对比）\n2. 覆盖不同角度：痛点、利益、情感、好奇、权威\n3. 文案符合平台字数限制\n4. 标注每组测试的假设\n5. 给出测后优化方向",model:"通用"},
  {id:83,title:"SEO关键词策略",cat:"marketing",tag:"营销",prompt:"你是一位SEO专家。请为[网站/产品]制定一套关键词策略。\n\n网站：[网站描述]\n行业：[行业]\n\n要求：\n1. 核心词（5个，搜索量大竞争高）\n2. 长尾词（15个，搜索意图明确）\n3. 问题类词（10个，适合FAQ/文章）\n4. 竞争分析（Top3竞品的词策略）\n5. 内容规划建议（每个词对应什么内容类型）",model:"通用"},
  {id:84,title:"直播话术脚本",cat:"marketing",tag:"营销",prompt:"请为[产品]的直播带货创作一套完整话术。\n\n产品：[产品]\n直播时长：[分钟]\n\n包含：\n1. 开场暖场话术（3分钟）\n2. 产品介绍话术（痛点→方案→效果→价格）\n3. 逼单话术（限时、限量、限价）\n4. 互动话术（引导点赞、评论、关注）\n5. 转款衔接话术\n6. 常见异议处理话术",model:"通用"},
  {id:85,title:"品牌故事创作",cat:"marketing",tag:"营销",prompt:"请为[品牌]创作一个打动人心的品牌故事。\n\n品牌信息：\n- 名称：[名称]\n- 品类：[品类]\n- 创始人背景：[背景]\n- 品牌理念：[理念]\n\n要求：\n1. 用故事化叙事，不要罗列事实\n2. 突出创始人初心和品牌使命\n3. 包含一个转折点/关键时刻\n4. 注入情感元素引发共鸣\n5. 控制在500字以内\n6. 适合放在官网「关于我们」页面",model:"通用"},
  {id:86,title:"用户调研问卷",cat:"marketing",tag:"营销",prompt:"请帮我设计一份用户调研问卷，用于[调研目的]。\n\n目标用户：[用户]\n投放渠道：[渠道]\n\n要求：\n1. 10-15个问题\n2. 问题类型合理搭配（单选/多选/量表/开放）\n3. 前3题简单易答，降低填写门槛\n4. 关键问题放在中间位置\n5. 结尾加NPS净推荐值\n6. 预计填写时长不超过5分钟",model:"通用"},
  {id:87,title:"短视频选题库",cat:"marketing",tag:"营销",prompt:"请为[领域]的短视频账号策划一个选题库（30个选题）。\n\n账号定位：[定位]\n目标粉丝：[画像]\n\n要求：\n1. 覆盖5种选题类型（教程/观点/故事/测评/热点）\n2. 每类6个具体选题\n3. 每个选题标注：标题建议、核心看点、预计时长、难度\n4. 标注5个爆款潜力选题\n5. 给出发布时间建议",model:"通用"},

  // === 教育学习 ===
  {id:100,title:"概念通俗解释",cat:"edu",tag:"教育",hot:true,prompt:"请用最简单易懂的方式解释「[概念]」，要求：\n1. 先用一句话概括\n2. 用日常生活中的比喻说明\n3. 举3个具体例子\n4. 如果可能，和已知概念做对比\n5. 语言通俗，像给一个完全不懂的人讲解\n6. 50字以内总结核心要点",model:"通用"},
  {id:101,title:"学习路线图",cat:"edu",tag:"教育",prompt:"请为「[方向]」设计一份从零到入门的学习路线图。\n\n目标：[目标如：3个月找到前端实习]\n基础：[已有基础]\n\n要求：\n1. 按阶段划分（基础→进阶→实战）\n2. 每个阶段的重点知识和时间分配\n3. 推荐学习资源（免费优先）\n4. 里程碑练习项目\n5. 常见坑和避坑建议\n6. 学完后的能力评估标准",model:"通用"},
  {id:102,title:"每日一题刷题法",cat:"edu",tag:"教育",prompt:"你是一位[科目]教师。请按「每日一题」模式，帮我出7道题（一周的量）。\n\n科目：[科目]\n难度：[难度]\n\n要求：\n1. 每天一个知识点，由浅入深\n2. 每道题包含：题目→解题思路→详细解答→举一反三\n3. 标注每题考察的能力点\n4. 周日出一套综合小测\n5. 适合[学生/职场人]使用",model:"通用"},
  {id:103,title:"英语口语陪练",cat:"edu",tag:"教育",hot:true,prompt:"You are an English speaking partner. Let's have a conversation about [topic]. Rules:\n1. Speak naturally at intermediate level\n2. Correct my grammar mistakes gently\n3. After each correction, give me a better way to say it\n4. Ask follow-up questions to keep the conversation going\n5. Teach me 2-3 new expressions or idioms each session",model:"通用"},
  {id:104,title:"考研政治/英语复习",cat:"edu",tag:"教育",prompt:"请帮我制定一份[考研政治/英语]的复习计划。\n\n目标分数：[分数]\n开始时间：[时间]\n每天可用时间：[小时]\n\n要求：\n1. 分3轮复习规划\n2. 每轮重点和用时分配\n3. 推荐资料和老师（带理由）\n4. 刷题策略（做什么题、做几遍）\n5. 关键时间节点（如：几月前完成一轮）\n6. 考前冲刺策略",model:"通用"},
  {id:105,title:"面试模拟问答",cat:"edu",tag:"教育",prompt:"请为[职位]的面试进行模拟问答。\n\n公司类型：[类型]\n岗位要求：[要求]\n\n请：\n1. 列出该岗位最常见的10个面试问题\n2. 对每个问题给出高分回答模板\n3. 标注回答中的STAR结构\n4. 给3个常见的坑和怎么避开\n5. 模拟追问和应对策略\n6. 提供一个反问面试官的好问题列表",model:"通用"},

  {id:122,title:"营养食谱推荐",cat:"life",tag:"生活",prompt:"请根据以下条件，为我推荐一周的食谱。\n\n饮食需求：[减脂/增肌/素食/...]\n卡路里目标：[千卡/天]\n忌口：[忌口]\n烹饪条件：[条件]\n\n要求：\n1. 每天早中晚三餐+加餐\n2. 标明每餐热量和三大营养素\n3. 做法简单（每道不超过3步）\n4. 食材易买，成本适中\n5. 周末可以有一餐cheat meal",model:"通用"},

  {id:124,title:"亲子教育咨询",cat:"life",tag:"生活",prompt:"你是一位儿童教育专家。请针对以下情况给出建议：\n\n孩子年龄：[年龄]\n问题：[问题描述]\n\n要求：\n1. 分析孩子的行为背后的心理原因\n2. 给父母的具体沟通话术（说什么，怎么说）\n3. 3个循序渐进的改善方法\n4. 需要避免的错误做法\n5. 推荐1-2本相关读物\n6. 什么情况需要专业干预",model:"通用"},

  {id:126,title:"买车/买房攻略",cat:"life",tag:"生活",prompt:"请帮我制定一份[买车/买房]的决策指南。\n\n预算：[预算]\n需求：[如：通勤代步/家庭用车]\n城市：[城市]\n\n要求：\n1. 决策流程（先做什么、后做什么）\n2. 关键指标对比表（列出候选和打分维度）\n3. 砍价技巧和话术\n4. 合同/贷款避坑清单\n5. 提车/收房检查清单\n6. 后续费用预估（月供/保险/税/保养）",model:"通用"},
  {id:127,title:"情感关系建议",cat:"life",tag:"生活",prompt:"你是一位情感关系咨询师。请针对以下情况，给出温和而有建设性的建议。\n\n情况：[描述]\n\n要求：\n1. 先共情，不要直接给结论\n2. 分析双方的可能的心理和需求\n3. 给出沟通话术模板\n4. 3个具体可操作的建议\n5. 提醒：复杂情况建议寻求专业咨询",model:"通用"},

// ============ COLLECTIONS ============
const collections = [
  {id:"c1",title:"小红书运营全套",desc:"从文案到选题到数据分析，一站配齐",icon:"📱",cats:["writing","marketing"],count:8},
  {id:"c2",title:"程序员效率包",desc:"代码、调试、部署、面试全覆盖",icon:"💻",cats:["coding"],count:10},
  {id:"c3",title:"职场新人救星",desc:"简历、周报、PPT、邮件全搞定",icon:"🚀",cats:["office","edu"],count:10},
  {id:"c4",title:"AI绘画从入门到精通",desc:"Midjourney/可灵/文生图提示词大全",icon:"🎨",cats:["art"],count:11},
  {id:"c5",title:"自媒体内容工厂",desc:"公众号、短视频、小红书内容批量生产",icon:"🏭",cats:["writing","marketing"],count:12},
  {id:"c6",title:"学霸养成计划",desc:"考研、英语、学习方法一网打尽",icon:"📚",cats:["edu"],count:8},
];

// ============ RENDER ============
let activeCat = 'all';
let activeSort = 'default';
let searchQuery = '';

const catNames = {writing:'写作创作',coding:'编程开发',art:'AI绘画',office:'办公效率',marketing:'营销运营',edu:'教育学习',life:'生活助手'};
const catColors = {writing:'var(--accent)',coding:'var(--blue)',art:'var(--pink)',office:'var(--green)',marketing:'var(--orange)',edu:'var(--cyan)',life:'var(--accent)'};

function getFiltered() {
  let list = [...prompts];
  // Category filter
  if (activeCat !== 'all') list = list.filter(p => p.cat === activeCat);
  // Search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p => p.title.toLowerCase().includes(q) || p.tag.includes(q) || p.prompt.toLowerCase().includes(q) || p.cat.includes(q));
  }
  // Sort
  if (activeSort === 'popular') list.sort((a,b) => (b.hot?1:0) - (a.hot?1:0));
  if (activeSort === 'new') list.reverse();
  return list;
}

function renderPrompts() {
  const list = getFiltered();
  const grid = document.getElementById('promptGrid');
  const noRes = document.getElementById('noResults');
  const count = document.getElementById('resultCount');

  if (list.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    count.textContent = '未找到匹配的提示词';
    return;
  }
  noRes.style.display = 'none';
  count.textContent = `显示 ${list.length} 条提示词`;

  grid.innerHTML = list.map(p => `
    <div class="prompt-card" data-cat="${p.cat}">
      <div class="card-header">
        <div class="card-title">${p.hot?'🔥 ':''}${p.title}</div>
        <span class="card-tag" style="background:${catColors[p.cat]}22;color:${catColors[p.cat]}">${p.tag}</span>
      </div>
      <div class="card-prompt">${escapeHtml(p.prompt)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:0.78em;color:var(--text-dim)">🤖 ${p.model}</span>
        <span style="font-size:0.78em;color:var(--text-dim)">${catNames[p.cat]}</span>
      </div>
      <div class="card-actions">
        <button class="copy-btn" onclick="copyPrompt(${p.id}, this)">📋 复制提示词</button>
        <button class="expand-btn" onclick="expandPrompt(${p.id})">🔍</button>
      </div>
    </div>
  `).join('');
}

function renderCollections() {
  document.getElementById('collectionsGrid').innerHTML = collections.map(c => `
    <div class="col-card" onclick="showCollection('${c.id}')">
      <div class="col-icon">${c.icon}</div>
      <div class="col-title">${c.title}</div>
      <div class="col-desc">${c.desc}</div>
      <div class="col-count">${c.count}条</div>
    </div>
  `).join('');
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============ ACTIONS ============
function copyPrompt(id, btn) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  navigator.clipboard.writeText(p.prompt).then(() => {
    btn.textContent = '✅ 已复制！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制提示词'; btn.classList.remove('copied'); }, 2000);
  });
}

function expandPrompt(id) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalPrompt').textContent = p.prompt;
  document.getElementById('modalCopy').onclick = function() {
    navigator.clipboard.writeText(p.prompt).then(() => {
      this.textContent = '✅ 已复制！';
      this.classList.add('copied');
      setTimeout(() => { this.textContent = '📋 一键复制'; this.classList.remove('copied'); }, 2000);
    });
  };
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function filterPrompts() {
  searchQuery = document.getElementById('search').value;
  renderPrompts();
}

function showCollection(cid) {
  const col = collections.find(c => c.id === cid);
  if (!col) return;
  activeCat = 'all';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-btn[data-cat="all"]').classList.add('active');
  searchQuery = '';
  document.getElementById('search').value = '';
  // Filter by collection categories
  const colPrompts = prompts.filter(p => col.cats.includes(p.cat));
  document.getElementById('promptGrid').innerHTML = colPrompts.map(p => `
    <div class="prompt-card" data-cat="${p.cat}">
      <div class="card-header">
        <div class="card-title">${p.hot?'🔥 ':''}${p.title}</div>
        <span class="card-tag" style="background:${catColors[p.cat]}22;color:${catColors[p.cat]}">${p.tag}</span>
      </div>
      <div class="card-prompt">${escapeHtml(p.prompt)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:0.78em;color:var(--text-dim)">🤖 ${p.model}</span>
        <span style="font-size:0.78em;color:var(--text-dim)">${catNames[p.cat]}</span>
      </div>
      <div class="card-actions">
        <button class="copy-btn" onclick="copyPrompt(${p.id}, this)">📋 复制提示词</button>
        <button class="expand-btn" onclick="expandPrompt(${p.id})">🔍</button>
      </div>
    </div>
  `).join('');
  document.getElementById('resultCount').textContent = `合集「${col.title}」: ${colPrompts.length} 条提示词`;
  document.getElementById('noResults').style.display = colPrompts.length ? 'none' : 'block';
  window.scrollTo({top:300,behavior:'smooth'});
}

function scrollToTop() { window.scrollTo({top:0,behavior:'smooth'}); }

// ============ EVENT LISTENERS ============
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeCat = this.dataset.cat;
    renderPrompts();
  });
});

document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeSort = this.dataset.sort;
    renderPrompts();
  });
});

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ============ INIT ============
renderPrompts();
renderCollections();
document.getElementById('totalCount').textContent = prompts.length + '+';
</script>
</body>
</html>
