const featuredIds = prompts.filter(p=>p.featured).map((_,i)=>i).filter(i=>prompts[i].featured);
let activeCat = 'all', activeDiff = 'all';

function filterPrompts() {
  let list = [...prompts];
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  if (activeCat !== 'all') list = list.filter(p => p.cat === activeCat);
  if (activeDiff !== 'all') list = list.filter(p => p.diff === activeDiff);
  if (q) list = list.filter(p => p.title.toLowerCase().includes(q) || p.catName.includes(q) || p.desc.includes(q));
  return list;
}

function setCat(cat) {
  activeCat = cat;
  renderCatGrid();
  renderAll();
}
function setFilter(diff, btn) {
  activeDiff = diff;
  document.querySelectorAll('.fl-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderAll();
}
function doSearch() { renderAll(); }

function renderCatGrid() {
  const cats = ['writing','coding','art','office','marketing','edu','life'];
  const catNames = {writing:'写作创作',coding:'编程开发',art:'AI绘画',office:'办公效率',marketing:'营销运营',edu:'教育学习',life:'生活助手'};
  document.getElementById('catGrid').innerHTML = cats.map(c => {
    const cc = CAT_COLOR[c];
    const count = prompts.filter(p => p.cat === c).length;
    return `<div class="cat-card${activeCat===c?' active':''}" onclick="setCat('${c}')" style="${activeCat===c?'border-color:var(--purple);background:var(--purple-light)':''}">
      <div class="icon" style="background:${cc.bg}">${cc.icon}</div>
      <div class="name">${catNames[c]}</div>
      <div class="count">${count} 条</div>
    </div>`;
  }).join('');
}

function renderFeatured() {
  const items = prompts.filter(p => p.featured).slice(0, 4);
  document.getElementById('featuredGrid').innerHTML = items.map(p => `
    <div class="feat-card" onclick="openModal('${p.title.replace(/'/g,"\\'")}')">
      <div class="fc-header">
        <div class="fc-title">${CAT_COLOR[p.cat].icon} ${p.title}</div>
        <div class="fc-badges">
          <span class="badge ${DIFF_CLASS[p.diff]}">${DIFF_MAP[p.diff]}</span>
          <span class="badge badge-model">${p.model.split('·')[0].trim()}</span>
        </div>
      </div>
      <div class="fc-desc">${p.desc}</div>
      <div class="fc-preview">${escapeHtml(p.prompt.substring(0,150))}...</div>
      <div class="fc-footer">
        <span>${p.catName} · ${p.model}</span>
        <span style="color:var(--purple)">查看详情 →</span>
      </div>
    </div>
  `).join('');
}

function renderAll() {
  const list = filterPrompts();
  document.getElementById('resultCount').textContent = `共 ${list.length} 条`;
  document.getElementById('empty').style.display = list.length ? 'none' : 'block';
  document.getElementById('promptGrid').innerHTML = list.map(p => `
    <div class="p-card">
      <div class="pc-top">
        <div class="pc-title">${CAT_COLOR[p.cat].icon} ${p.title}</div>
        <div class="fc-badges">
          <span class="badge ${DIFF_CLASS[p.diff]}">${DIFF_MAP[p.diff]}</span>
          <span class="badge badge-model">${p.model.split('·')[0].trim()}</span>
        </div>
      </div>
      <div class="pc-desc">${p.desc}</div>
      <div class="pc-preview">${escapeHtml(p.prompt.substring(0,120))}...</div>
      <div class="pc-bottom">
        <span class="pc-model">${p.model}</span>
        <div class="pc-actions">
          <button class="btn-sm btn-detail" onclick="openModal('${p.title.replace(/'/g,"\\'")}')">详情</button>
          <button class="btn-sm btn-copy" onclick="copyPrompt('${p.title.replace(/'/g,"\\'")}',this)">复制</button>
        </div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function openModal(title) {
  const p = prompts.find(p => p.title === title);
  if (!p) return;
  document.getElementById('mTitle').textContent = p.title;
  document.getElementById('mMeta').innerHTML = `${CAT_COLOR[p.cat].icon} ${p.catName} · ${DIFF_MAP[p.diff]} · ${p.model}`;
  document.getElementById('mPrompt').textContent = p.prompt;
  document.getElementById('mTips').innerHTML = `<strong>💡 使用技巧</strong><br>${p.tips}`;
  document.getElementById('modal').classList.add('show');
  currentModalPrompt = p;
}
let currentModalPrompt = null;
function modalCopy() {
  if (!currentModalPrompt) return;
  navigator.clipboard.writeText(currentModalPrompt.prompt).then(() => {
    const btn = document.getElementById('mCopyBtn');
    btn.textContent = '✅ 已复制！';
    setTimeout(() => { btn.textContent = '📋 复制到剪贴板'; }, 2000);
  });
}
function copyPrompt(title, btn) {
  const p = prompts.find(p => p.title === title);
  if (!p) return;
  navigator.clipboard.writeText(p.prompt).then(() => {
    btn.textContent = '✅';
    setTimeout(() => { btn.textContent = '复制'; }, 1500);
  });
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function randomPrompt() {
  const p = prompts[Math.floor(Math.random() * prompts.length)];
  openModal(p.title);
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderCatGrid();
renderFeatured();
renderAll();
